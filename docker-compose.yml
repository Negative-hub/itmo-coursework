version: '3.8'

services:
  backend:
    build: ./semantic-graph-api
    container_name: semantic-graph-api
    ports:
      - "8000:8000"
    volumes:
      - ./semantic-graph-api/instance:/app/instance
      - ./semantic-graph-api/app:/app/app
    environment:
    - PYTHONPATH=/app
    restart: unless-stopped
    networks:
      - semantic-network

  frontend:
    build: ./semantic-graph-frontend
    container_name: semantic-graph-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - ./semantic-graph-frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - semantic-network

networks:
  semantic-network:
    driver: bridge